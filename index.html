<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Bi Bô — Học tiếng Việt cùng Bi Bô</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:linear-gradient(180deg,#7ed3a8 0%,#a8e6c4 30%,#cdf0dc 60%,#eafaf0 100%);
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;padding:12px;overflow:hidden;
}

/* ── animations ── */
@keyframes bobble{0%,100%{transform:translateY(0) rotate(-2deg)}25%{transform:translateY(-10px) rotate(2deg)}50%{transform:translateY(0) rotate(-1deg)}75%{transform:translateY(-6px) rotate(2deg)}}
@keyframes wiggle{0%,100%{transform:rotate(0)}20%{transform:rotate(-8deg)}40%{transform:rotate(8deg)}60%{transform:rotate(-5deg)}80%{transform:rotate(5deg)}}
@keyframes jump{0%,100%{transform:translateY(0) scale(1)}30%{transform:translateY(-26px) scale(1.06,0.95)}50%{transform:translateY(-30px) scale(1)}70%{transform:translateY(0) scale(0.96,1.05)}85%{transform:translateY(-8px)}}
@keyframes pop{0%{transform:scale(0.4);opacity:0}70%{transform:scale(1.18)}100%{transform:scale(1);opacity:1}}
@keyframes sparkle{0%{opacity:0;transform:scale(0) rotate(0)}50%{opacity:1;transform:scale(1.25) rotate(180deg)}100%{opacity:0;transform:scale(0) rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
@keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes wobble{0%,100%{transform:rotate(-4deg) scale(1)}50%{transform:rotate(4deg) scale(1.06)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.09)}}
@keyframes blinkEyes{0%,92%,100%{transform:scaleY(1)}95%{transform:scaleY(0.08)}}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(560px) rotate(540deg);opacity:0}}
@keyframes ripple{0%{box-shadow:0 0 0 0 rgba(46,139,87,0.45)}100%{box-shadow:0 0 0 22px rgba(46,139,87,0)}}

.bob{animation:bobble 2.6s ease-in-out infinite;}
.wiggle{animation:wiggle 0.7s ease;}
.jump{animation:jump 0.9s cubic-bezier(.36,.07,.19,.97);}
.pop-in{animation:pop 0.45s cubic-bezier(.36,.07,.19,.97) both;}
.fade-in{animation:fadeIn 0.35s ease both;}
.shake{animation:shake 0.35s ease;}
.speaking{animation:pulse 0.5s ease-in-out infinite;}

.frame{width:100%;max-width:420px;}
.screen{
  background:
    linear-gradient(180deg,#e8f9ff 0%,#dff5ec 45%,#c7eed8 100%);
  border-radius:28px;
  border:1px solid #bfe8d2;
  box-shadow:0 8px 32px rgba(46,139,87,0.18);
  min-height:560px;
  display:flex;flex-direction:column;align-items:center;
  padding:20px 18px 14px;
  position:relative;overflow:hidden;
}
/* sky glow + sun rays at top */
.screen::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(circle at 80% 6%, rgba(255,236,170,0.55), transparent 30%),
    radial-gradient(ellipse 120% 40% at 50% 112%, rgba(46,139,87,0.28), transparent 62%),
    radial-gradient(circle at 15% 10%, rgba(255,255,255,0.5), transparent 22%);
  pointer-events:none;z-index:0;
}
/* lake water band at the bottom with gentle wave */
.screen::after{
  content:'';position:absolute;left:0;right:0;bottom:0;height:34%;
  background:
    linear-gradient(180deg, rgba(93,217,138,0.25), rgba(46,139,87,0.4));
  border-radius:0 0 28px 28px;
  pointer-events:none;z-index:0;
  -webkit-mask:radial-gradient(ellipse 60% 16px at 50% 0, transparent 70%, #000 72%) repeat-x;
  mask:radial-gradient(ellipse 60% 16px at 50% 0, transparent 70%, #000 72%) repeat-x;
  -webkit-mask-size:60px 100%;mask-size:60px 100%;
  animation:waveShift 6s linear infinite;
}
@keyframes waveShift{0%{-webkit-mask-position:0 0;mask-position:0 0;}100%{-webkit-mask-position:60px 0;mask-position:60px 0;}}
.screen>*{position:relative;z-index:2;}

/* floating decorative layer (bubbles, lily pads, sparkles) */
.scene-deco{position:absolute;inset:0;z-index:1;pointer-events:none;overflow:hidden;border-radius:28px;}
.bubble-d{position:absolute;border-radius:50%;background:radial-gradient(circle at 35% 30%, rgba(255,255,255,0.9), rgba(168,240,220,0.35) 60%, rgba(126,211,168,0.15));border:1px solid rgba(255,255,255,0.5);animation:rise linear infinite;}
@keyframes rise{0%{transform:translateY(20px) scale(0.8);opacity:0}10%{opacity:0.9}90%{opacity:0.7}100%{transform:translateY(-580px) scale(1.1);opacity:0}}
.lily{position:absolute;font-size:30px;animation:floatLily 5s ease-in-out infinite;}
@keyframes floatLily{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-8px) rotate(4deg)}}
.cloud{position:absolute;font-size:34px;opacity:0.85;animation:drift linear infinite;}
@keyframes drift{0%{transform:translateX(-60px)}100%{transform:translateX(460px)}}
.twinkle{position:absolute;font-size:16px;animation:twk 2.6s ease-in-out infinite;}
@keyframes twk{0%,100%{opacity:0.2;transform:scale(0.7)}50%{opacity:1;transform:scale(1.15)}}

.dots{display:flex;gap:8px;justify-content:center;margin-bottom:10px;}
.dot{width:10px;height:10px;border-radius:50%;background:#bfe8d2;transition:background 0.3s;}
.dot.active{background:#2E8B57;animation:pulse 1.4s ease-in-out infinite;}
.dot.done{background:#1A5C2A;}

.speak-btn{
  background:#E1F5EE;border:3px solid #2E8B57;border-radius:50%;
  width:64px;height:64px;font-size:26px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;margin:8px auto;
  transition:transform 0.15s;flex-shrink:0;color:#1A5C2A;
  animation:ripple 2.2s ease-out infinite;
}
.speak-btn:active{transform:scale(0.85);}

.viet-word{
  background:#E1F5EE;border-radius:16px;padding:10px 26px;font-size:38px;font-weight:700;
  color:#1A5C2A;margin:4px 0;letter-spacing:0.02em;cursor:pointer;
  animation:floaty 2.4s ease-in-out infinite;
}

.big-emoji{
  font-size:96px;cursor:pointer;margin:2px 0;line-height:1.1;
  animation:wobble 2s ease-in-out infinite;display:inline-block;
}

.next-btn{
  background:#2E8B57;color:#fff;border:none;border-radius:50%;
  width:68px;height:68px;font-size:32px;cursor:pointer;margin-top:10px;
  display:flex;align-items:center;justify-content:center;transition:background 0.15s,transform 0.15s;flex-shrink:0;
  box-shadow:0 4px 14px rgba(46,139,87,0.35);
}
.next-btn:active{background:#1A5C2A;transform:scale(0.9);}

.choices{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;margin:8px 0;}
.obj-btn{
  background:#fff;border:3.5px solid #9FE1CB;border-radius:22px;padding:14px 4px 12px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:4px;min-height:104px;
  transition:transform 0.12s,border-color 0.12s;
  animation:floaty 2.2s ease-in-out infinite;
}
.obj-btn:nth-child(2){animation-delay:0.35s;}
.obj-btn:nth-child(3){animation-delay:0.7s;}
.obj-btn:active{transform:scale(0.88);}
.obj-emoji{font-size:58px;line-height:1.1;}
.obj-btn.correct{border-color:#2E8B57;background:#E1F5EE;animation:pulse 0.6s ease 2;}
.obj-btn.wrong{border-color:#D85A30;background:#FAECE7;animation:none;}
.obj-btn.dim{opacity:0.3;animation:none;}

.parent-strip{
  background:#FAEEDA;border-radius:12px;padding:8px 12px;font-size:11px;color:#633806;
  text-align:center;margin-top:auto;line-height:1.5;width:100%;
}
.reward-box{background:#fff;border:3px solid #FAC775;border-radius:22px;padding:16px;text-align:center;width:100%;box-shadow:0 4px 18px rgba(250,199,117,0.4);}
.sparkle{position:absolute;pointer-events:none;font-size:24px;z-index:5;}
.confetti{position:absolute;pointer-events:none;width:10px;height:14px;border-radius:3px;z-index:5;animation:confettiFall 1.8s ease-in both;}

.bibo-wrap{cursor:pointer;line-height:0;}
/* blinking eyes group inside the bibo svg */
.bibo-eyes{transform-origin:center;transform-box:fill-box;animation:blinkEyes 4.2s ease-in-out infinite;}
/* gentle leg paddle */
@keyframes paddleL{0%,100%{transform:rotate(0)}50%{transform:rotate(-9deg)}}
@keyframes paddleR{0%,100%{transform:rotate(0)}50%{transform:rotate(9deg)}}
.leg-l{transform-box:fill-box;transform-origin:top center;animation:paddleL 1.6s ease-in-out infinite;}
.leg-r{transform-box:fill-box;transform-origin:top center;animation:paddleR 1.6s ease-in-out infinite;}

.word-cards{display:flex;gap:8px;margin-top:8px;justify-content:center;}
.word-card{
  background:#E1F5EE;border-radius:14px;padding:8px 12px;text-align:center;cursor:pointer;
  animation:floaty 2.4s ease-in-out infinite;transition:transform 0.12s;
}
.word-card:nth-child(2){animation-delay:0.3s;}
.word-card:nth-child(3){animation-delay:0.6s;}
.word-card:active{transform:scale(0.88);}
</style>
</head>

// ── Audio engine: Web Audio API (robust on iOS/sandboxes) with HTMLAudio fallback ──
let audioCtx = null;
const buffers = {};      // decoded Web Audio buffers
const htmlPlayers = {};  // fallback <audio> elements
let currentSource = null;
let currentHtml = null;
let audioUnlocked = false;

function b64ToArrayBuffer(b64){
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) bytes[i] = bin.charCodeAt(i);
  return bytes.buffer;
}

async function initAudio(){
  if(audioUnlocked) return;
  audioUnlocked = true;
  try{
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if(audioCtx.state === 'suspended') await audioCtx.resume();
    // decode all clips
    await Promise.all(Object.keys(AUDIO).map(async k=>{
      try{
        buffers[k] = await audioCtx.decodeAudioData(b64ToArrayBuffer(AUDIO[k]));
      }catch(e){ /* fall back per-clip below */ }
    }));
  }catch(e){
    audioCtx = null;
  }
  // build HTMLAudio fallbacks for any clip that failed to decode
  for(const k in AUDIO){
    if(!buffers[k]){
      const a = new Audio("data:audio/mpeg;base64," + AUDIO[k]);
      a.preload = "auto";
      htmlPlayers[k] = a;
    }
  }
}

function stopCurrent(){
  if(currentSource){ try{currentSource.stop();}catch(e){} currentSource = null; }
  if(currentHtml){ currentHtml.pause(); currentHtml.currentTime = 0; currentHtml = null; }
}

function play(key, onEnd){
  stopCurrent();
  const bibo = document.getElementById('bibo-char');
  if(bibo) bibo.classList.add('speaking');
  const done = ()=>{
    const b = document.getElementById('bibo-char');
    if(b) b.classList.remove('speaking');
    if(onEnd) onEnd();
  };

  if(audioCtx && buffers[key]){
    if(audioCtx.state === 'suspended') audioCtx.resume();
    const src = audioCtx.createBufferSource();
    src.buffer = buffers[key];
    src.connect(audioCtx.destination);
    src.onended = done;
    currentSource = src;
    src.start(0);
  } else if(htmlPlayers[key]){
    const a = htmlPlayers[key];
    currentHtml = a;
    a.currentTime = 0;
    a.onended = a.onerror = done;
    a.play().catch(done);
  } else {
    done();
  }
}

// ── Scenes ───────────────────────────────────────────────
const scenes=[
  {type:'intro', audio:'chao_be'},
  {type:'word', emoji:'🍌', viet:'Chuối', phraseAudio:'say_chuoi', wordAudio:'chuoi'},
  {type:'quiz', viet:'Chuối', quizAudio:'tim_chuoi',
   options:[{e:'🍌',correct:true},{e:'🍎',correct:false},{e:'🥕',correct:false}]},
  {type:'word', emoji:'🐱', viet:'Mèo', phraseAudio:'say_meo', wordAudio:'meo'},
  {type:'quiz', viet:'Mèo', quizAudio:'tim_meo',
   options:[{e:'🐶',correct:false},{e:'🐱',correct:true},{e:'🐸',correct:false}]},
  {type:'word', emoji:'⭐', viet:'Sao', phraseAudio:'say_sao', wordAudio:'sao'},
  {type:'quiz', viet:'Sao', quizAudio:'tim_sao',
   options:[{e:'🌙',correct:false},{e:'☀️',correct:false},{e:'⭐',correct:true}]},
  {type:'reward', audio:'cam_on'}
];

let current=0, chosen=null;

function dots(){
  return scenes.map((s,i)=>{
    if(s.type==='intro'||s.type==='reward') return '';
    const cl=i<current?'dot done':i===current?'dot active':'dot';
    return `<div class="${cl}"></div>`;
  }).join('');
}

function tapBibo(audioKey){
  const b=document.getElementById('bibo-char');
  if(b){ b.classList.remove('wiggle'); void b.offsetWidth; b.classList.add('wiggle'); }
  play(audioKey);
}

// ── Renderers ────────────────────────────────────────────
function renderIntro(){
  setTimeout(()=>play('chao_be'),500);
  return `<div class="screen fade-in">
    <div class="dots">${dots()}</div>
    <div id="bibo-char" class="bibo-wrap bob" onclick="tapBibo('chao_be')">${biboSVG(165,'happy')}</div>
    <button class="speak-btn" onclick="tapBibo('chao_be')">▶</button>
    <button class="next-btn" onclick="next()">➜</button>
    <div class="parent-strip">👨‍👩‍👧 <strong>Parent:</strong> Tap ▶ so your child hears Bi Bô, then tap ➜ to start! Bi Bô just hatched from a jade egg and needs your child's help.</div>
  </div>`;
}

function renderWord(s){
  setTimeout(()=>play(s.phraseAudio),350);
  return `<div class="screen fade-in">
    <div class="dots">${dots()}</div>
    <div id="bibo-char" class="bibo-wrap" onclick="tapBibo('${s.phraseAudio}')">${biboSVG(115,'default')}</div>
    <div class="big-emoji pop-in" onclick="play('${s.wordAudio}')">${s.emoji}</div>
    <div class="viet-word pop-in" onclick="play('${s.wordAudio}')">${s.viet}</div>
    <button class="speak-btn" onclick="tapBibo('${s.phraseAudio}')">▶</button>
    <button class="next-btn" onclick="next()">➜</button>
    <div class="parent-strip">👨‍👩‍👧 Tap ▶ to replay. Tap the picture to hear just the word. Say <strong>"${s.viet}"</strong> together!</div>
  </div>`;
}

function renderQuiz(s){
  const answered=chosen!==null;
  const correctIdx=s.options.findIndex(o=>o.correct);
  const isRight=answered&&chosen===correctIdx;
  if(!answered) setTimeout(()=>play(s.quizAudio),350);

  const opts=s.options.map((o,i)=>{
    let cl='obj-btn';
    if(answered){
      if(o.correct) cl+=' correct';
      else if(chosen===i) cl+=' wrong';
      else cl+=' dim';
    }
    return `<button class="${cl}" id="opt${i}" onclick="answer(${i})">
      <span class="obj-emoji">${o.e}</span>
    </button>`;
  }).join('');

  let expr='confused';
  if(answered) expr = isRight ? 'happy' : 'surprised';
  const biboCls = answered && isRight ? 'bibo-wrap jump' : 'bibo-wrap';

  return `<div class="screen fade-in">
    <div class="dots">${dots()}</div>
    <div id="bibo-char" class="${biboCls}" onclick="tapBibo('${s.quizAudio}')">${biboSVG(115,expr)}</div>
    <div class="viet-word" onclick="play('${s.quizAudio}')">${s.viet}</div>
    <button class="speak-btn" onclick="tapBibo('${s.quizAudio}')">▶</button>
    <div class="choices">${opts}</div>
    ${answered&&isRight  ? `<div style="font-size:42px;margin:2px 0" class="pop-in">🎉⭐🎉</div>` : ''}
    ${answered&&!isRight ? `<div style="font-size:42px;margin:2px 0" class="pop-in">💪🔄</div>` : ''}
    ${answered&&isRight  ? `<button class="next-btn pop-in" onclick="next()">➜</button>` : ''}
    ${answered&&!isRight ? `<button class="next-btn" style="background:#EF9F27" onclick="resetQuiz()">🔄</button>` : ''}
    <div class="parent-strip">👨‍👩‍👧 Tap ▶ to replay "Help Bi Bô find the word". Let your child tap the picture!</div>
  </div>`;
}

function renderReward(){
  setTimeout(()=>{ play('cam_on'); confettiBurst(); },450);
  return `<div class="screen fade-in">
    <div style="font-size:36px;margin-bottom:2px">✨🌟✨</div>
    <div id="bibo-char" class="bibo-wrap bob" onclick="tapBibo('cam_on')">${biboSVG(135,'happy')}</div>
    <button class="speak-btn" onclick="tapBibo('cam_on')">▶</button>
    <div class="reward-box pop-in" style="margin-top:4px">
      <div style="font-size:56px;animation:wobble 2s ease-in-out infinite;display:inline-block">🏮</div>
      <div style="font-size:16px;font-weight:600;color:#633806;margin:6px 0 2px">Bi Bô's lucky lantern!</div>
      <div style="display:flex;gap:4px;justify-content:center;font-size:24px;margin:4px 0">⭐⭐⭐</div>
    </div>
    <div class="word-cards">
      <div class="word-card" onclick="play('chuoi')"><div style="font-size:28px">🍌</div><div style="font-size:13px;font-weight:600;color:#1A5C2A">Chuối</div><div style="font-size:16px">🔊</div></div>
      <div class="word-card" onclick="play('meo')"><div style="font-size:28px">🐱</div><div style="font-size:13px;font-weight:600;color:#1A5C2A">Mèo</div><div style="font-size:16px">🔊</div></div>
      <div class="word-card" onclick="play('sao')"><div style="font-size:28px">⭐</div><div style="font-size:13px;font-weight:600;color:#1A5C2A">Sao</div><div style="font-size:16px">🔊</div></div>
    </div>
    <button class="next-btn" style="margin-top:10px" onclick="restart()">🔄</button>
    <div class="parent-strip">👨‍👩‍👧 Tap each card to hear the word again. Join the waitlist: <strong>bibô.app</strong></div>
  </div>`;
}

// ── Logic ────────────────────────────────────────────────
function sceneDeco(){
  // bubbles rising from the lake
  let b='';
  const bubbles=[[12,18,7],[28,10,5],[46,26,9],[63,14,6],[78,22,8],[88,12,5],[20,40,4],[70,38,6],[40,8,5],[55,30,7]];
  bubbles.forEach((p,i)=>{
    b+=`<div class="bubble-d" style="left:${p[0]}%;bottom:-${p[1]}px;width:${p[2]*2}px;height:${p[2]*2}px;animation-duration:${7+i%5}s;animation-delay:${i*0.6}s"></div>`;
  });
  // lily pads floating on the water
  let lily=`<div class="lily" style="left:8%;bottom:8%">🪷</div>
            <div class="lily" style="left:74%;bottom:5%;animation-delay:1.2s">🪷</div>
            <div class="lily" style="left:44%;bottom:3%;animation-delay:2.1s;font-size:24px">🍃</div>`;
  // clouds drifting across the sky
  let clouds=`<div class="cloud" style="top:7%;left:0;animation-duration:26s">☁️</div>
              <div class="cloud" style="top:16%;left:0;animation-duration:34s;animation-delay:6s;font-size:26px;opacity:0.7">☁️</div>`;
  // twinkles scattered in the sky
  let tw='';
  const twk=[[18,12],[30,20],[68,10],[82,18],[52,8],[90,26]];
  twk.forEach((p,i)=>{ tw+=`<div class="twinkle" style="left:${p[0]}%;top:${p[1]}%;animation-delay:${i*0.4}s">✨</div>`; });
  return `<div class="scene-deco">${clouds}${tw}${b}${lily}</div>`;
}

function render(){
  const s=scenes[current];
  let html='';
  if(s.type==='intro')  html=renderIntro();
  else if(s.type==='word')   html=renderWord(s);
  else if(s.type==='quiz')   html=renderQuiz(s);
  else if(s.type==='reward') html=renderReward();
  document.getElementById('app').innerHTML=html;
  // inject decorative scene layer just inside the screen
  const screen=document.querySelector('.screen');
  if(screen){ screen.insertAdjacentHTML('afterbegin', sceneDeco()); }
}

function next(){current=Math.min(current+1,scenes.length-1);chosen=null;render();}
function restart(){current=0;chosen=null;render();}

function answer(i){
  if(chosen!==null) return;
  chosen=i;
  render();
  const correctIdx=scenes[current].options.findIndex(o=>o.correct);
  if(i===correctIdx){
    play('dung_roi');
    launchSparkles();
    confettiBurst();
  } else {
    play('chua_dung');
    const btn=document.getElementById('opt'+i);
    if(btn){btn.classList.add('shake');setTimeout(()=>btn.classList.remove('shake'),400);}
  }
}

function resetQuiz(){chosen=null;render();}

function launchSparkles(){
  const screen=document.querySelector('.screen');
  ['⭐','🌟','✨','💫','🌟','✨'].forEach((s,i)=>{
    const el=document.createElement('div');
    el.className='sparkle';
    el.textContent=s;
    el.style.cssText=`left:${10+Math.random()*80}%;top:${5+Math.random()*50}%;animation:sparkle 1.1s ${i*0.1}s both`;
    screen.appendChild(el);
    setTimeout(()=>el.remove(),1600);
  });
}

function confettiBurst(){
  const screen=document.querySelector('.screen');
  const colors=['#5DD98A','#FAC775','#FF8FAB','#7FC8F8','#2E8B57','#EF9F27'];
  for(let i=0;i<18;i++){
    const el=document.createElement('div');
    el.className='confetti';
    el.style.cssText=`left:${5+Math.random()*90}%;top:-10px;background:${colors[i%colors.length]};animation-delay:${Math.random()*0.5}s;animation-duration:${1.4+Math.random()*0.8}s`;
    screen.appendChild(el);
    setTimeout(()=>el.remove(),2600);
  }
}

// ── Start overlay: unlocks audio with the first tap (required by mobile browsers) ──
function renderStart(){
  document.getElementById('app').innerHTML = `
  <div class="screen fade-in" style="justify-content:center">
    ${sceneDeco()}
    <div class="bibo-wrap bob">${biboSVG(180,'happy')}</div>
    <div style="font-size:22px;font-weight:700;color:#1A5C2A;margin:14px 0 4px">Bi Bô</div>
    <button class="next-btn" style="width:96px;height:96px;font-size:44px;margin-top:14px" onclick="startApp()">▶</button>
    <div class="parent-strip" style="margin-top:24px">👨‍👩‍👧 <strong>Parent:</strong> Tap the big ▶ button to wake Bi Bô up and turn on his voice!</div>
  </div>`;
}

async function startApp(){
  await initAudio();
  render();
}

renderStart();
</script>
</body>
</html>
